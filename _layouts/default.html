<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
    {% include head-custom.html %}

<script>
document.onkeydown = checkKey;

function page(p) {
  pattern = /page(\d+)/;
  path = document.location.toString();
  m = path.match(pattern);
  i = parseInt(m[1]);
  i = i + p;
  return "/page" + i;
}

function checkKey(e) {
  e = e || window.event;
  if (e.keyCode == '37') {
    document.location = page(-1);
  }
  else if (e.keyCode == '39') {
    document.location = page(1);
  }
}
</script>
  </head>
  <body>
    <div class="container">
      <section id="main_content">
        {{ content }}
<hr>
<table border="0">
<tr>
  <td align="left">
    <a href="javascript:document.location=page(-1);"><img src="images/arrowleft.png"></a>
  </td>
  <td align="right">
    <a href="javascript:document.location=page(1);"><img src="images/arrowright.png"></a>
  </td>
</tr>
</table>
      </section>
    </div>
  </body>
</html>
