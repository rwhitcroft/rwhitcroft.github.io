<script>
document.onkeydown = checkKey;

function page(p) {
  pattern = /page(\d+)/;
  path = document.location.toString();
  m = path.match(pattern);
  i = parseInt(m[1]);
  i = i + p;
  return "/page" + i;
}

function checkKey(e) {
  e = e || window.event;
  if (e.keyCode == '37') {
    document.location = page(-1);
  }
  else if (e.keyCode == '39') {
    document.location = page(1);
  }
}
</script>
